<!DOCTYPE html>

    <style>

<body>
    <div class="container">
        <header>
            <div class="ai-title">
                <h1>AI Подбор гардероба</h1>
                <span class="ai-badge"><i class="fas fa-brain"></i> Machine Learning</span>
            </div>
            <p class="subtitle">Нейросеть анализирует погоду и время суток для подбора идеальной одежды</p>
        </header>

        <main>
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Введите город для анализа..." autocomplete="off">
                    <button id="searchBtn"><i class="fas fa-search"></i> Анализировать</button>
                </div>
                <div class="popular-cities">
                    <p>Популярные города для анализа:</p>
                    <div id="citiesList"></div>
                </div>
            </div>

            <div class="weather-container">
                <div class="loading" id="loading" style="display: none;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 15px; font-size: 1.2rem;">AI анализирует погодные данные и время суток...</p>
                </div>
                <div id="weatherResult"></div>
            </div>
        </main>

        <footer>
            <p>Система учитывает температуру, ветер и осадки для точных рекомендаций</p>
            <p>Данные предоставлены <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
            <p id="timestamp"></p>
        </footer>
    </div>

    <script>
// Глобальные переменные для хранения текущих данных
let currentWeatherData = null;
let currentRecommendations = [];

document.addEventListener('DOMContentLoaded', function() {
    console.log("AI система гардероба загружена");
    loadPopularCities();
    document.getElementById('searchBtn').addEventListener('click', searchWeather);
    document.getElementById('cityInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchWeather();
    });
    document.getElementById('timestamp').textContent = new Date().toLocaleString('ru-RU');
});

async function loadPopularCities() {
    try {
        const response = await fetch('/cities');
        const cities = await response.json();
        const citiesList = document.getElementById('citiesList');
        citiesList.innerHTML = '';
        cities.forEach(function(city) {
            const chip = document.createElement('div');
            chip.className = 'city-chip';
            chip.textContent = city.name + ' (' + city.country + ')';
            chip.addEventListener('click', function() {
                document.getElementById('cityInput').value = city.name;
                searchWeather();
            });
            citiesList.appendChild(chip);
        });
    } catch (error) {
        console.error('Ошибка загрузки городов:', error);
    }
}

async function searchWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) {
        alert('Пожалуйста, введите название города для анализа');
        return;
    }
    
    const weatherResult = document.getElementById('weatherResult');
    const loading = document.getElementById('loading');
    weatherResult.innerHTML = '';
    loading.style.display = 'block';
    
    try {
        const response = await fetch('/weather?city=' + encodeURIComponent(city));
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const data = await response.json();
        loading.style.display = 'none';
        
        if (data && data.success) {
            displayWeather(data);
        } else {
            const errorMsg = data?.error || 'Не удалось получить данные';
            weatherResult.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle fa-2x"></i>
                    <h3>Ошибка анализа</h3>
                    <p>${errorMsg}</p>
                </div>
            `;
        }
    } catch (error) {
        loading.style.display = 'none';
        weatherResult.innerHTML = `
            <div class="error">
                <i class="fas fa-wifi-slash fa-2x"></i>
                <h3>Ошибка сети</h3>
                <p>Проверьте подключение к интернету</p>
            </div>
        `;
    }
}

function displayWeather(data) {
    const weather = data.current || {};
    const mlItems = weather.ml_items || [];
    
    // Сохраняем данные для фидбека
    currentWeatherData = weather;
    
    // Получаем время восхода и заката
    const sunrise = weather.sunrise || '06:00';
    const sunset = weather.sunset || '18:00';

// Функция для создания чекбоксов выбора
function createItemSelection(items) {
    const container = document.getElementById('itemSelection');
    if (!container) return;
    
    container.innerHTML = '';
    
    items.forEach((item, index) => {
        // Убираем эмодзи для отображения
        const cleanItem = item.replace('🕶️ ', '').replace('🧥 ', '')
                            .replace('☂️ ', '').replace('❄️ ', '')
                            .replace('💨 ', '').replace('🔥 ', '')
                            .replace('👣 ', '').replace('🎭 ', '')
                            .replace('🥼 ', '').replace('🌊 ', '')
                            .replace('✨ ', '').replace('⛏️ ', '')
                            .replace('💨 ', '').replace('❄️ ', '')
                            .replace('🧴 ', '').replace('👓 ', '');
        
        const div = document.createElement('div');
        div.className = 'item-checkbox';
        div.style.cssText = `
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #e2e8f0;
        `;
        
        div.innerHTML = `
            <input type="checkbox" id="item_${index}" 
                   style="margin-right: 10px; transform: scale(1.2);"
                   onchange="toggleItemSelection(this, '${cleanItem}')">
            <label for="item_${index}" style="cursor: pointer; flex: 1;">
                ${getCorrectMLItemEmoji(item)} ${cleanItem}
            </label>
        `;
        
        container.appendChild(div);
    });
}

// Текущий выбор пользователя
let selectedItems = [];

function toggleItemSelection(checkbox, item) {
    if (checkbox.checked) {
        selectedItems.push(item);
    } else {
        selectedItems = selectedItems.filter(i => i !== item);
    }
    console.log('Выбрано элементов:', selectedItems.length);
}

// Функция отправки фидбека
async function submitFeedback(feedbackType) {
    if (!currentWeatherData || !currentRecommendations.length) {
        showMessage('Сначала получите рекомендации!', 'error');
        return;
    }
    
    try {
        const response = await fetch('/save_preference', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                weather: currentWeatherData,
                recommended: currentRecommendations,
                selected: selectedItems.length > 0 ? selectedItems : currentRecommendations,
                feedback_type: feedbackType
            })
        });
        
        const result = await response.json();
        
        if (result.success) {
            const message = feedbackType === 'good' 
                ? '✅ Спасибо! AI учтёт ваш выбор и станет умнее!'
                : '🔄 Спасибо за обратную связь! AI скорректирует рекомендации.';
            
            showMessage(message, 'success');
            
            // Обновляем статистику на странице
            updateStatsDisplay(result.stats);
            
            // Сбрасываем выбор
            selectedItems = [];
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        } else {
            showMessage('❌ Ошибка сохранения: ' + result.error, 'error');
        }
    } catch (error) {
        console.error('Ошибка отправки фидбека:', error);
        showMessage('❌ Ошибка сети. Попробуйте ещё раз.', 'error');
    }
}

// Показ подробного выбора
function showDetailedSelection() {
    const checkboxes = document.querySelectorAll('#itemSelection input[type="checkbox"]');
    checkboxes.forEach(cb => cb.style.display = 'block');
    showMessage('✅ Отметьте галочками элементы, которые вам подходят', 'info');
}

// Вспомогательные функции
function showMessage(text, type) {
    const messageDiv = document.getElementById('feedbackMessage');
    if (!messageDiv) return;
    
    messageDiv.textContent = text;
    messageDiv.style.display = 'block';
    messageDiv.style.background = type === 'success' ? '#c6f6d5' : 
                                 type === 'error' ? '#fed7d7' : '#bee3f8';
    messageDiv.style.color = type === 'success' ? '#22543d' : 
                            type === 'error' ? '#742a2a' : '#2a4365';
    
    setTimeout(() => {
        messageDiv.style.display = 'none';
    }, 5000);
}

// Функция для получения предупреждений
function getWarnings(weather, windSpeed, windGust, temperature, precipitationProb, precipitationType) {
    const warnings = [];
    
    // Предупреждение о сильном ветре (более 10 м/с)
    if (windSpeed >= 10) {
        let windLevel = '';
        let description = '';
        
        if (windSpeed >= 20) {
            windLevel = 'очень сильный';
            description = 'Опасные условия! Рекомендуется остаться дома.';
        } else if (windSpeed >= 15) {
            windLevel = 'сильный';
            description = 'Будьте осторожны на улице.';
        } else {
            windLevel = 'умеренный';
            description = 'Одевайтесь теплее, ветер усиливает ощущение холода.';
        }
        
        warnings.push({
            emoji: '💨',
            title: `Сильный ветер: ${windSpeed.toFixed(1)} м/с`,
            description: `${windLevel} ветер. ${description}`
        });
    }
    
    // Предупреждение о порывах ветра
    if (windGust > windSpeed && windGust >= 15) {
        warnings.push({
            emoji: '🌪️',
            title: `Порывы ветра до ${windGust.toFixed(1)} м/с`,
            description: 'Осторожно! Возможны резкие порывы ветра.'
        });
    }
    
    // Предупреждение о сильном морозе
    if (temperature < -20) {
        warnings.push({
            emoji: '🥶',
            title: 'Сильный мороз',
            description: `Температура ${temperature.toFixed(1)}°C. Требуется очень теплая одежда.`
        });
    } else if (temperature < -10) {
        warnings.push({
            emoji: '❄️',
            title: 'Морозная погода',
            description: `Температура ${temperature.toFixed(1)}°C. Одевайтесь очень тепло.`
        });
    }
    
    // Предупреждение о сильных осадках
    if (precipitationProb > 80) {
        const precipType = precipitationType === 'snow' ? 'снегопаде' : 'ливне';
        warnings.push({
            emoji: precipitationType === 'snow' ? '❄️' : '🌧️',
            title: `Сильный ${precipitationType === 'snow' ? 'снегопад' : 'дождь'}`,
            description: `Высокая вероятность сильного ${precipType}. Будьте осторожны.`
        });
    }
    
    // Предупреждение о гололеде (при температуре около 0 и осадках)
    if (temperature > -3 && temperature < 3 && precipitationProb > 50) {
        warnings.push({
            emoji: '⚠️',
            title: 'Возможен гололед',
            description: 'Осторожно! Дороги и тротуары могут быть скользкими. Используйте ледоступы на обувь от гололеда или противоскользящие наклейки для обуви.'
        });
    }
    
    return warnings;
}

// Функция для определения вероятности и типа осадков с учетом температуры
function getPrecipitationData(weather, temperature) {
    let probability = 0;
    let type = 'rain';
    
    if (weather.precipitation_probability !== undefined) {
        probability = weather.precipitation_probability;
    } else {
        const weatherDesc = (weather.weather_description || '').toLowerCase();
        const weatherMain = (weather.weather_main || '').toLowerCase();
        
        if (weatherDesc.includes('дождь') || weatherDesc.includes('ливень') || 
            weatherMain.includes('rain') || weatherDesc.includes('осадки')) {
            probability = 80;
        } else if (weatherDesc.includes('снег') || weatherDesc.includes('метель') || 
                  weatherMain.includes('snow')) {
            probability = 70;
            type = 'snow';
        } else if (weatherDesc.includes('изморось') || weatherDesc.includes('моросящий') || 
                  weatherDesc.includes('морось')) {
            probability = 60;
        } else if (weatherDesc.includes('облачно') || weatherDesc.includes('пасмурно') || 
                  weatherMain.includes('clouds')) {
            probability = 30;
        } else {
            const humidity = weather.humidity || 0;
            if (humidity > 80) probability = 40;
            else if (humidity > 60) probability = 20;
            else probability = 10;
        }
    }
    
    // КОРРЕКТИРУЕМ ТИП ОСАДКОВ ПО ТЕМПЕРАТУРЕ
    if (temperature < -1) {
        type = 'snow';
        const humidity = weather.humidity || 0;
        if (humidity > 70 && probability < 50) {
            probability = Math.min(probability + 30, 80);
        }
    } else if (temperature < 1) {
        type = 'snow_rain';
    } else {
        type = 'rain';
    }
    
    return {
        probability: Math.min(probability, 100),
        type: type
    };
}

// Функция для определения ясной погоды
function isWeatherClear(weather) {
    const weatherDesc = (weather.weather_description || '').toLowerCase();
    const weatherMain = (weather.weather_main || '').toLowerCase();
    
    const clearConditions = ['ясно', 'солнечно', 'малооблачно', 'чистое небо', 'clear'];
    
    return clearConditions.some(condition => 
        weatherDesc.includes(condition) || weatherMain.includes(condition)
    );
}

if (isClearWeather && isDaytime) {  // ← ИСПОЛЬЗУЕМ isDaytime, переданный в функцию!

    }
}
    
    // Рекомендация для зонта ТОЛЬКО при температуре выше -1°C
    if (precipitationProb > 40 && temperature > -1) {

    }
    
    // Рекомендация для дождевика при температуре выше -1°C
    if (precipitationProb > 60 && temperature > -1) {
        const weatherDesc = (weather.weather_description || '').toLowerCase();
        if (weatherDesc.includes('дождь') || weatherDesc.includes('ливень')) {
            if (!recommendations.some(r => r.includes('Дождевик'))) {
                recommendations.push('🧥 Дождевик');
            }
        }
    }
    
    // Предупреждение о вероятности снега при температуре ниже -1°C и высокой влажности
    if (temperature < -1) {
        const humidity = weather.humidity || 0;
        if (humidity > 70 && precipitationProb > 30) {
            if (!recommendations.some(r => r.includes('снег'))) {
                recommendations.push('❄️ Вероятность снега');
            }
        }
    }
    
    // Если тип осадков - снег, добавляем рекомендацию
    //if (precipitationType === 'snow' && temperature < 1) {
    //    if (!recommendations.some(r => r.includes('снег'))) {
    //        recommendations.push('❄️ Возможен снег');
    //    }
    //}
    
    // Рекомендация ветрозащитной одежды при сильном ветре
    if (windSpeed >= 10) {
        recommendations.push('💨 Ветрозащитная одежда');
    }
    
    // Рекомендация теплой одежды при ветре и низкой температуре
    if (windSpeed >= 8 && temperature < 5) {
        if (!recommendations.some(r => r.includes('Теплая') || r.includes('Ветрозащитная'))) {

// Функция для описания вероятности осадков
function getPrecipitationDescription(probability, type) {
    const typeText = type === 'snow' ? 'снега' : 'осадков';
    
    if (probability > 80) return `Высокая вероятность ${typeText}`;
    if (probability > 60) return `Высокая вероятность ${typeText}`;  // Было "Вероятен"
    if (probability > 40) return `Небольшая вероятность ${typeText} !`; // С восклицательным знаком
    if (probability > 20) return `Малая вероятность ${typeText}`;
    
    return `Весьма малая вероятность ${typeText} `;
}

// Функция для описания типа осадков
function getPrecipitationTypeDescription(type, temperature) {
    if (type === 'snow') {
        if (temperature < -10) return 'Сухой снег';
        else if (temperature < -5) return 'Снег';
        else return 'Мокрый снег';
    } else if (type === 'snow_rain') {

    } else {

        else if (temperature < 15) return 'Прохладный дождь';
        else return 'Теплый дождь';
    }
}

function isCurrentTimeDaytime(sunrise, sunset) {
    try {
        const now = new Date();
        const currentHours = now.getHours();
        const currentMinutes = now.getMinutes();
        const currentTotalMinutes = currentHours * 60 + currentMinutes;
        
        const sunriseParts = sunrise.split(':');
        const sunriseHours = parseInt(sunriseParts[0]) || 6;
        const sunriseMinutes = parseInt(sunriseParts[1]) || 0;
        const sunriseTotalMinutes = sunriseHours * 60 + sunriseMinutes;
        
        const sunsetParts = sunset.split(':');
        const sunsetHours = parseInt(sunsetParts[0]) || 18;
        const sunsetMinutes = parseInt(sunsetParts[1]) || 0;
        const sunsetTotalMinutes = sunsetHours * 60 + sunsetMinutes;
        
        return currentTotalMinutes >= (sunriseTotalMinutes - 30) && 
               currentTotalMinutes <= (sunsetTotalMinutes + 30);
    } catch (error) {
        console.error('Ошибка определения времени суток:', error);
        const currentHours = new Date().getHours();
        return currentHours >= 6 && currentHours < 20;
    }
}
